# Deploy automático: push na branch `main` → build Vite → envia `dist/` por FTP para a HostGator.
#
# Configure no repositório GitHub → Settings → Secrets and variables → Actions:
#   FTP_HOST     — servidor FTP (ex.: ftp.seudominio.com ou o IP do cPanel)
#   FTP_USER     — utilizador FTP (muitas vezes o mesmo do cPanel, ex.: johnn315)
#   FTP_PASSWORD — palavra-passe da conta FTP
#   GEMINI_API_KEY — chave Google AI Studio (mesma do .env local); embute no JS em produção
# Opcional — Variables: GEMINI_MODEL (ex. gemini-2.5-flash), SLACK_WEBHOOK_URL também como Secret acima
#
# IMPORTANTE — server-dir é RELATIVO à pasta inicial do utilizador FTP (nunca `/home3/...` absoluto).
#
# O destino tem de ser o MESMO que cPanel → Domínios → Document Root do site (ex.: public_html/).
# Se enviares para `ad-hub.digital/` mas o domínio aponta para `public_html/`, o site não atualiza.
#
# Variável (recomendado): GitHub → Settings → Variables → Actions → FTP_SERVER_DIR
#   Exemplos: `public_html/`  |  `ad-hub.digital/`  |  `public_html/ad-hub.digital/`  |  `./`
# (depende da conta FTP: raiz da conta vs pasta já fixada ao domínio)
#
# IntelliSearch: opcional `VITE_INTELLISEARCH_API_URL` se a API for noutro domínio.
# No ad-hub.digital o `dist/` inclui `api/intellisearch/proxy.php` (PHP → 127.0.0.1:PORT do minha-api).
#
# Vários destinos: duplica o step "Deploy via FTP" com outro `local-dir` + `server-dir`, ou um job extra.

name: Deploy para HostGator (FTP)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-hostgator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      # SLACK_WEBHOOK_URL (secret): Incoming Webhook incorporado no bundle (fallback global).
      # Alternativa: webhook só nas definições do cliente na app (localStorage), sem variável no CI.
      # GEMINI_API_KEY (secret): IA no browser. Também exposto como VITE_* para compatibilidade com tutoriais Vite.
      - name: Build (Vite)
        env:
          VITE_INTELLISEARCH_API_URL: ${{ vars.VITE_INTELLISEARCH_API_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          VITE_SLACK_RELAY_URL: ${{ vars.VITE_SLACK_RELAY_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          VITE_GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # OAuth Google Ads via Cloudflare Worker (mesmo valor que Google Cloud redirect URI).
          VITE_INSIGHT_HUB_GOOGLE_ADS_REDIRECT_URI: ${{ vars.VITE_INSIGHT_HUB_GOOGLE_ADS_REDIRECT_URI || 'https://google-ads-worker.ad-hub.workers.dev/google-ads/callback' }}
        run: npm run build

      # Front (Vite): pasta = Document Root do domínio (no teu caso: public_html/)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_SERVER_DIR || 'public_html/' }}
          dangerous-clean-slate: false

      # Descomenta se precisares de enviar OUTRO conjunto de ficheiros para ad-hub.digital/ (ex. estáticos, API estática).
      # Prepara uma pasta no repo (ex. deploy/ad-hub-extras/) e usa local-dir + server-dir adequados.
      # - name: Deploy extras para ad-hub.digital
      #   uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      #   with:
      #     server: ${{ secrets.FTP_HOST }}
      #     username: ${{ secrets.FTP_USER }}
      #     password: ${{ secrets.FTP_PASSWORD }}
      #     local-dir: ./deploy/ad-hub-extras/
      #     server-dir: ad-hub.digital/
      #     dangerous-clean-slate: false
