# Deploy automático: push na branch `main` → build Vite → envia `dist/` por FTP para a HostGator.
#
# Configure no repositório GitHub → Settings → Secrets and variables → Actions:
#   FTP_HOST     — servidor FTP (ex.: ftp.seudominio.com ou o IP do cPanel)
#   FTP_USER     — utilizador FTP (muitas vezes o mesmo do cPanel, ex.: johnn315)
#   FTP_PASSWORD — palavra-passe da conta FTP
#
# IMPORTANTE — server-dir é RELATIVO à pasta inicial do utilizador FTP (nunca `/home3/...` absoluto).
#
# No cPanel → Contas FTP → vê o campo "Diretório" dessa conta:
#   • Se for /home3/USER/ (raiz da conta)     → usa `ad-hub.digital/` (ou deixa o default da variável).
#   • Se for .../ad-hub.digital/ (já o site) → define em GitHub → Variables → FTP_SERVER_DIR = `./`
# Sem isso, o deploy pode ir para ad-hub.digital/ad-hub.digital/ e o domínio continua a servir a raiz antiga.
#
# Opcional: repositório → Settings → Variables → Actions → FTP_SERVER_DIR (ex.: `./` ou `ad-hub.digital/`).

name: Deploy para HostGator (FTP)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-hostgator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Default ad-hub.digital/; em GitHub → Settings → Variables → FTP_SERVER_DIR usa `./` se o FTP já abre na pasta do domínio
          server-dir: ${{ vars.FTP_SERVER_DIR || 'ad-hub.digital/' }}
          dangerous-clean-slate: false
